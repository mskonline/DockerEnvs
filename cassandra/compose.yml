version: '3.8'

services:
  cassandra:
    image: cassandra:4
    container_name: cassandra
    ports:
      - "127.0.0.1:9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
      - cassandra_logs:/var/log/cassandra
    environment:
       CASSANDRA_USERNAME: cassandra
       CASSANDRA_PASSWORD: cassandra

volumes:
  cassandra_data:
  cassandra_logs: